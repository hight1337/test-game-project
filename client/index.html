<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>F1 Web Racer</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%23e10600'/%3E%3Ctext x='8' y='12' font-size='10' font-weight='bold' text-anchor='middle' fill='white' font-family='sans-serif'%3EF1%3C/text%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <canvas id="game-canvas"></canvas>

    <!-- in-race HUD -->
    <div id="hud" class="hidden">
      <div id="hud-topleft">
        <div id="hud-pos">P1</div>
        <div id="hud-lap">LAP 1/3</div>
      </div>
      <div id="hud-times">
        <div><span class="tlabel">TIME</span><span id="time-cur">--:--.---</span></div>
        <div><span class="tlabel">LAST</span><span id="time-last">--:--.---</span></div>
        <div><span class="tlabel">BEST</span><span id="time-best">--:--.---</span></div>
      </div>
      <canvas id="speedo" width="210" height="182"></canvas>
      <span id="speed-val" class="hidden">0</span>
      <canvas id="minimap" width="160" height="160"></canvas>
      <div id="hud-center" class="hidden"></div>
      <div id="hud-wrongway" class="hidden">WRONG WAY</div>
      <div id="hud-help">WASD / arrows — drive&nbsp;&nbsp;R — reset&nbsp;&nbsp;L — racing line&nbsp;&nbsp;M — mute&nbsp;&nbsp;Esc — leave</div>
    </div>

    <!-- menu / lobby / results overlays -->
    <div id="screens"></div>
    <div id="toast" class="hidden"></div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
